<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bønnetider Oslo — Shia</title>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #2c3e50;
            --accent-color: #7f8c8d;
            --border-color: #ececec;
            --highlight: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            line-height: 1.6;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--highlight);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        h1 {
            font-weight: 300;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .date {
            font-size: 0.9rem;
            color: var(--accent-color);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        td {
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 1.1rem;
        }

        .prayer-name {
            text-align: left;
            font-weight: 400;
            color: #555;
        }

        .prayer-time {
            text-align: right;
            font-weight: 500;
            color: #000;
        }

        .footer {
            font-size: 0.8rem;
            color: var(--accent-color);
            margin-top: 20px;
            font-style: italic;
        }

        /* Enkel responsivitet */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bønnetider</h1>
        <div class="date">Oslo • Shia Muslimske Tider</div>

        <table>
            <tr>
                <td class="prayer-name">Fajr (Morgen)</td>
                <td class="prayer-time">04:12</td>
            </tr>
            <tr>
                <td class="prayer-name">Dhuhr (Middag)</td>
                <td class="prayer-time">13:05</td>
            </tr>
            <tr>
                <td class="prayer-name">Asr (Ettermiddag)</td>
                <td class="prayer-time">16:45</td>
            </tr>
            <tr>
                <td class="prayer-name">Maghrib (Kveld)</td>
                <td class="prayer-time">22:10</td>
            </tr>
            <tr>
                <td class="prayer-name">Isha (Natt)</td>
                <td class="prayer-time">23:30</td>
            </tr>
        </table>

        <div class="footer">
            Vennligst bekreft tidene med din lokale moské. <br>
            Designet med skandinavisk minimalisme.
        </div>
    </div>

</body>
</html>
